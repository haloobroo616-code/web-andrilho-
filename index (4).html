<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy Website - 1 Klik</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#111;
  padding:30px;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:22px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #333;
  background:#000;
  color:#fff;
}

input[type="file"]{
  padding:8px;
  background:#111;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  color:#000;
  transition:0.2s;
}

button:hover{
  background:#ddd;
}

.result{
  margin-top:20px;
  padding:10px;
  background:#000;
  border-radius:8px;
  font-size:14px;
  word-break:break-all;
}
.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#777;
}
</style>
</head>
<body>

<div class="container">
  <h1>🚀 1 Klik Deploy ke Vercel</h1>

  <input id="project" placeholder="Nama Project">
  <input id="apikey" placeholder="API Key Vercel">
  <input type="file" id="file" accept=".html">

  <button onclick="deploy()">DEPLOY SEKARANG</button>

  <div class="result" id="result"></div>
</div>

<div class="footer">
  Powered by Vercel API
</div>

<script>
async function deploy(){
  const project = document.getElementById("project").value;
  const apiKey = document.getElementById("apikey").value;
  const fileInput = document.getElementById("file");
  const resultBox = document.getElementById("result");

  if(!project || !apiKey || fileInput.files.length === 0){
    alert("Lengkapi semua dulu!");
    return;
  }

  const file = fileInput.files[0];
  const text = await file.text();

  resultBox.innerHTML = "⏳ Sedang deploy...";

  const response = await fetch("https://api.vercel.com/v13/deployments", {
    method:"POST",
    headers:{
      "Authorization":`Bearer ${apiKey}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name: project,
      files: [
        {
          file: "index.html",
          data: btoa(text),
          encoding: "base64"
        }
      ]
    })
  });

  const data = await response.json();

  if(data.url){
    resultBox.innerHTML = 
      "✅ Berhasil!<br><br>" +
      "<a href='https://" + data.url + "' target='_blank' style='color:#4da6ff'>https://" + data.url + "</a>";
  }else{
    resultBox.innerHTML = "❌ Gagal deploy. Cek API Key.";
  }
}
</script>

</body>
</html>
